<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kate Yeh · 葉渝旻 — 作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --white: #ffffff;
      --ink: #1a1a1a;
      --mid: #555555;
      --light: #999999;
      --rule: #e8e8e8;
      --accent: #2a2a2a;
      --max-w: 1040px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans TC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 400;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .nav-name {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--ink);
    }

    /* ── Hero ── */
    .hero {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 56px 48px 48px;
      width: 100%;
    }

    .hero-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 300;
      line-height: 1.3;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 16px;
    }

    .hero h1 strong { font-weight: 600; }

    .hero-desc {
      font-size: 0.9rem;
      color: var(--mid);
      line-height: 1.85;
      max-width: 560px;
    }

    /* ── Filter ── */
    .filter-wrap {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 48px 32px;
      width: 100%;
      border-bottom: 1px solid var(--rule);
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      padding: 6px 16px;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      border: 1px solid var(--rule);
      border-radius: 100px;
      background: var(--white);
      color: var(--mid);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .filter-btn:hover { border-color: #bbb; color: var(--ink); }

    .filter-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
    }

    /* ── Grid ── */
    .grid-wrap {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 48px 48px 80px;
      flex: 1;
      width: 100%;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 3px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: #bbb;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .card.hidden { display: none; }
    .card.no-link { cursor: default; }
    .card.no-link:hover { border-color: var(--rule); box-shadow: none; transform: none; }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #ece9e4;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .card:hover .card-thumb img { transform: scale(1.03); }

    .card-body { padding: 20px 22px 24px; }

    .card-type {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 0.8rem;
      color: var(--mid);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .card-metric {
      padding-top: 14px;
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .metric-value {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .metric-label {
      font-size: 0.72rem;
      color: var(--light);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-left { font-size: 0.76rem; color: var(--light); }

    .footer-right {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .footer-right a {
      font-size: 0.76rem;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-right a:hover { color: var(--ink); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .projects-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      nav { padding: 18px 24px; }
      .hero { padding: 40px 24px 36px; }
      .filter-wrap { padding: 0 24px 28px; }
      .grid-wrap { padding: 36px 24px 64px; }
      .projects-grid { grid-template-columns: 1fr; }
      footer { padding: 20px 24px; flex-direction: column; gap: 10px; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-name">Kate Yeh · 葉渝旻</span>
  </nav>

  <div class="hero">
    <div class="hero-label">Selected Work</div>
    <h1>葉渝旻 Kate Yeh<br><strong>專案作品集</strong></h1>
    <p class="hero-desc">具備跨領域專案管理、營運流程建置、群眾募資執行與大型活動行政統籌經驗。長期在音樂產業、新創平台與消費品專案中，負責多方協作、資訊整合、時程推進與流程優化，擅長在目標模糊、角色交錯與資源有限的情境下，將複雜專案整理為可執行的工作流程與協作系統。</p>
  </div>

  <div class="filter-wrap">
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-tag="all">全部</button>
      <button class="filter-btn" data-tag="系統設計">系統設計</button>
      <button class="filter-btn" data-tag="活動行政">活動行政</button>
      <button class="filter-btn" data-tag="群眾募資">群眾募資</button>
      <button class="filter-btn" data-tag="視覺企劃">視覺企劃</button>
      <button class="filter-btn" data-tag="趨勢研究">趨勢研究</button>
      <button class="filter-btn" data-tag="音樂產業">音樂產業</button>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="projects-grid" id="projectsGrid"></div>
  </div>

  <footer>
    <div class="footer-left">katey.mgt@gmail.com</div>
    <div class="footer-right">
      <a href="https://www.linkedin.com/in/kate-yeh-64955873/" target="_blank" rel="noopener">LinkedIn</a>
    </div>
  </footer>

  <script>
    const PROJECTS = [
      {
        "id": "heishi",
        "title": "黑市音樂 — 營運系統建構",
        "subtitle": "系統設計 · 跨角色需求整合",
        "cover": "assets/images/heishi-cover.png",
        "url": "projects/heishi.html",
        "tags": ["系統設計", "流程優化", "音樂產業"],
        "metric": { "value": "3 → 1", "label": "重工層數壓縮" },
        "type": "系統 / 流程"
      },
      {
        "id": "hujiao",
        "title": "呼叫音樂節 — 演出行政統籌",
        "subtitle": "大型活動行政 · 資料架構",
        "cover": "assets/images/hujiao-cover.png",
        "url": "projects/hujiao.html",
        "tags": ["活動行政", "多方協調", "音樂產業"],
        "metric": { "value": "40 組", "label": "演出藝人整合" },
        "type": "活動 / 行政"
      },
      {
        "id": "superdouble",
        "title": "輕輕背 Plus — 客戶合作重建",
        "subtitle": "低信任客戶關係 · 規格收斂",
        "cover": "assets/images/superdouble-cover.png",
        "url": "projects/superdouble.html",
        "tags": ["客戶關係", "專案管理", "群眾募資"],
        "metric": { "value": "NT$2,030,279", "label": "最終募資金額" },
        "type": "募資 / 客戶關係"
      },
      {
        "id": "neciken",
        "title": "南西肯恩 — 專輯募資案",
        "subtitle": "群眾募資 · 利害關係人管理",
        "cover": "assets/images/neciken_01.jpg",
        "url": "projects/neciken.html",
        "tags": ["群眾募資", "專案管理", "音樂產業"],
        "metric": { "value": "NT$1,708,391", "label": "最終募資金額" },
        "type": "募資 / 專案管理"
      },
      {
        "id": "songwang",
        "title": "王頌 — 視覺方向規劃",
        "subtitle": "視覺定位提案 · Moodboard 建立 · 創意對齊統籌",
        "cover": "assets/images/songwang_03.jpg",
        "url": "projects/songwang.html",
        "tags": ["視覺企劃", "創意方向", "音樂產業"],
        "metric": { "value": "4 組", "label": "藝人視覺方向統籌" },
        "type": "視覺 / 創意方向"
      },
      {
        "id": "copyright",
        "title": "音樂版稅版權分析工具",
        "subtitle": "CSV 上傳 · Tier 分析 · 預付金抵扣試算",
        "cover": "assets/images/copyright-cover.png",
        "url": "projects/copyright.html",
        "tags": ["系統設計", "音樂產業"],
        "metric": { "value": "4 個", "label": "分析模組" },
        "type": "工具 / 資料分析"
      },
      {
        "id": "zeczec",
        "title": "集資專案庫存自動監控工具",
        "subtitle": "瀏覽器模擬 · 閾值觸發 · 多管道通知",
        "cover": "assets/images/zeczec-cover.png",
        "url": "projects/zeczec.html",
        "tags": ["系統設計", "群眾募資"],
        "metric": { "value": "自動", "label": "庫存異動即時通知" },
        "type": "自動化 / 工具"
      },
      {
        "id": "piccollage",
        "title": "PicCollage — 視覺趨勢情蒐系統",
        "subtitle": "半自動情報管道 · 4 大趨勢群組 · 內容策展優先矩陣",
        "cover": "assets/images/piccollage-trend.jpeg",
        "url": "https://kateyuminyeh.github.io/piccollage-trend-intelligence/",
        "tags": ["趨勢研究", "視覺策展", "內容策略"],
        "metric": { "value": "4 大群組", "label": "12 個視覺趨勢信號分析" },
        "type": "趨勢 / 內容策展"
      }
    ];

    let projects = PROJECTS;
    let activeTag = 'all';

    function init() {
      render();
    }

    function render() {
      const grid = document.getElementById('projectsGrid');
      grid.innerHTML = '';

      const filtered = activeTag === 'all'
        ? projects
        : projects.filter(p => p.tags.includes(activeTag));

      filtered.forEach(p => {
        const card = document.createElement(p.url ? 'a' : 'div');
        card.className = 'card' + (p.url ? '' : ' no-link');
        if (p.url) {
          card.href = p.url;
          if (p.url.startsWith('http')) { card.target = '_blank'; card.rel = 'noopener'; }
        }
        card.innerHTML = `
          <div class="card-thumb">
            <img src="${p.cover}" alt="${p.title}" loading="lazy">
          </div>
          <div class="card-body">
            <div class="card-type">${p.type}</div>
            <div class="card-title">${p.title}</div>
            <div class="card-subtitle">${p.subtitle}</div>
            <div class="card-metric">
              <span class="metric-value">${p.metric.value}</span>
              <span class="metric-label">${p.metric.label}</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    document.getElementById('filterBar').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTag = btn.dataset.tag;
      render();
    });

    init();
  </script>

</body>
</html>
